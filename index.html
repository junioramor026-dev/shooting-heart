<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shooting Heart</title>

<style>

body{
margin:0;
overflow:hidden;
background:#12002a;
font-family:Arial;
}

canvas{
position:absolute;
top:0;
left:0;
display:none;
}

#cat{
position:fixed;
bottom:30px;
left:30px;
display:none;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
background:#ff2a6d;
border:none;
color:white;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="login">

<h2>Digite a senha</h2>

<input id="password" type="password">

<br><br>

<button onclick="enter()">Entrar</button>

<p id="error"></p>

</div>

<canvas id="canvas"></canvas>

<div id="cat">

<svg width="120" height="120" viewBox="0 0 120 120">

<circle cx="60" cy="60" r="35" fill="white"/>

<circle cx="45" cy="55" r="4"/>
<circle cx="75" cy="55" r="4"/>

<polygon points="30,40 45,20 55,45" fill="white"/>
<polygon points="90,40 75,20 65,45" fill="white"/>

<rect x="55" y="70" width="40" height="10" fill="#ff2a6d"/>
<circle cx="100" cy="75" r="6" fill="#ff2a6d"/>

</svg>

</div>

<script>

const PASSWORD = "9837172"

function enter(){

const pass=document.getElementById("password").value

if(pass===PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("canvas").style.display="block"
document.getElementById("cat").style.display="block"

start()

}else{

document.getElementById("error").innerText="senha incorreta"

}

}

function start(){

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]
let shootingStars=[]
let hearts=[]
let targets=[]

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

})

}

function spawnStar(){

shootingStars.push({

x:Math.random()*canvas.width,
y:0,
vx:-4,
vy:4,
life:120

})

}

setInterval(spawnStar,2500)

ctx.font="bold 90px Arial"
ctx.fillText("I LOVE YOU, BEAUTIFUL",canvas.width/2-420,canvas.height/2)

let data=ctx.getImageData(0,0,canvas.width,canvas.height).data

for(let y=0;y<canvas.height;y+=6){
for(let x=0;x<canvas.width;x+=6){

let index=(y*canvas.width+x)*4

if(data[index+3]>128){

targets.push({x,y})

}

}
}

ctx.clearRect(0,0,canvas.width,canvas.height)

function shoot(){

if(targets.length>0){

let t=targets.shift()

hearts.push({

x:120,
y:canvas.height-100,
tx:t.x,
ty:t.y

})

}

}

setInterval(shoot,35)

function animate(){

ctx.fillStyle="rgba(18,0,42,0.4)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.fillRect(s.x,s.y,s.size,s.size)

})

shootingStars.forEach((s,i)=>{

s.x+=s.vx
s.y+=s.vy
s.life--

ctx.fillRect(s.x,s.y,2,2)

if(s.life<=0){

shootingStars.splice(i,1)

}

})

hearts.forEach(h=>{

h.x+=(h.tx-h.x)*0.05
h.y+=(h.ty-h.y)*0.05

ctx.fillStyle="#ff2a6d"
ctx.font="18px Arial"
ctx.fillText("❤",h.x,h.y)

})

requestAnimationFrame(animate)

}

animate()

}

</script>

</body>
</html>
